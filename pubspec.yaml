name: in_real_time_v1
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.1.3
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  http: ^1.6.0
  shared_preferences: ^2.5.4
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  just_audio: ^0.10.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#0E0E0E"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
