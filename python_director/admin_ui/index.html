<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Director Studio | Creative Workspace</title>
    <link rel="stylesheet" href="/admin-static/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="bg-glow"></div>
    
    <header class="topbar">
      <div class="brand">
        <h1>Director Studio</h1>
        <p id="subtitle" class="dim">Creative Workspace v2</p>
      </div>
      <div class="toolbar">
        <button id="refreshStudioBtn" class="btn">Refresh</button>
        <button id="snapshotPipelineBtn" class="btn">Snapshot Prompts</button>
        <button id="resetPipelineBtn" class="btn">Reset Default</button>
        <button id="openSettingsBtn" class="btn">Settings</button>
        <div class="divider"></div>
        <button id="runPipelineBtn" class="btn primary">Dry Run</button>
        <button id="tabCompareBtn" class="btn">Compare Runs</button>
      </div>
    </header>

    <main class="workspace">
      <!-- Left Panel: Library -->
      <aside class="sidebar">
        <h2>Pipeline Library</h2>
        
        <div class="sidebar-section">
          <div class="field-group">
            <label class="field-label">Pipeline Name</label>
            <input id="pipelineNameInput" type="text" placeholder="Pipeline Name" />
          </div>
          <div class="field-group" style="margin-top: 12px;">
            <label class="field-label">Description</label>
            <input id="pipelineDescriptionInput" type="text" placeholder="Short description" />
          </div>
        </div>

        <div class="sidebar-section">
          <label class="field-label">Saved Pipelines</label>
          <select id="pipelineLibrarySelect" style="margin-bottom: 8px;"></select>
          <div style="display: flex; gap: 8px;">
            <button id="loadPipelineBtn" class="btn" style="flex: 1;">Load</button>
            <button id="saveNamedPipelineBtn" class="btn" style="flex: 1;">Save As Named</button>
          </div>
        </div>

        <div class="sidebar-section">
          <label class="field-label">Pipeline Defaults</label>
          <div class="field-group" style="margin-bottom: 8px;">
            <label class="field-label" style="font-size: 0.7rem;">Gemini Core</label>
            <select id="pipelineGeminiModelInput"></select>
          </div>
          <div class="field-group">
            <label class="field-label" style="font-size: 0.7rem;">OpenAI Core</label>
            <select id="pipelineOpenaiModelInput"></select>
          </div>
        </div>
        
        <div class="pipeline-list" id="pipelineCanvas"></div>

        <div class="sidebar-section" style="margin-top: auto;">
          <label class="field-label">Add Block Template</label>
          <div id="templateRail" class="template-rail"></div>
        </div>

        <div style="padding-top: 12px;">
          <button id="savePipelineBtn" class="btn primary" style="width: 100%;">Save Design</button>
        </div>
      </aside>

      <!-- Center Panel: Command Center -->
      <section class="editor-main">
        <div id="activeRunBanner" class="progress-banner hidden">
          <div style="display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 600;">
            <span id="runStatusLabel">Running Pipeline...</span>
            <span id="runProgressText">0%</span>
          </div>
          <div class="progress-track">
            <div id="runProgressFill" class="progress-fill" style="width: 0%;"></div>
          </div>
        </div>

        <div class="command-center">
          <div id="inspectorEmpty" class="empty" style="flex: 1; display: flex; align-items: center; justify-content: center;">
            <p>Select a block from the library to edit.</p>
          </div>

          <form id="blockInspector" class="editor-wrapper hidden">
            <div class="editor-header">
              <h2 id="currentBlockTitle">Block Name</h2>
              <div style="display: flex; gap: 8px; align-items: center;">
                <span id="blockIdBadge" class="dim" style="font-size: 0.8rem; font-family: monospace;">BLOCK_ID</span>
                <div id="blockStatusDot" class="status-dot"></div>
              </div>
            </div>

            <div class="inspector-grid">
              <div class="field-group">
                <label class="field-label">Block ID</label>
                <input id="blockIdInput" type="text" />
              </div>
              <div class="field-group">
                <label class="field-label">Block Name</label>
                <input id="blockNameInput" type="text" />
              </div>
              <div class="field-group">
                <label class="field-label">Type</label>
                <input id="blockTypeInput" type="text" disabled />
              </div>
              <div class="field-group">
                <label class="field-label">Enabled</label>
                <select id="blockEnabledInput">
                  <option value="true">Enabled</option>
                  <option value="false">Disabled</option>
                </select>
              </div>
              <div class="field-group">
                <label class="field-label">Provider</label>
                <select id="blockProviderInput">
                  <option value="GEMINI">Gemini</option>
                  <option value="OPENAI">OpenAI</option>
                </select>
              </div>
              <div class="field-group">
                <label class="field-label">Model Override</label>
                <select id="blockModelSourceInput">
                  <option value="default">Pipeline Default</option>
                  <option value="custom">Block Override</option>
                </select>
              </div>
              <div class="field-group">
                <label class="field-label">Model Selection</label>
                <input id="blockModelInput" list="providerModelList" />
              </div>
              <div class="field-group">
                <label class="field-label">Temperature</label>
                <input id="blockTempInput" type="number" min="0" max="2" step="0.1" />
              </div>
              <div class="field-group">
                <label class="field-label">Response Schema</label>
                <select id="blockSchemaInput"></select>
              </div>
            </div>
            <div id="blockModelHint" class="field-hint dim" style="font-size: 0.75rem; margin-top: 4px;"></div>

            <div class="field-group" style="margin-top: 16px;">
              <label class="field-label">System Instruction</label>
              <textarea id="blockSystemInstructionInput" class="prompt-editor" style="height: 100px; min-height: 80px;"></textarea>
            </div>
            
            <div class="field-group" style="margin-top: 16px;">
              <label class="field-label">Prompt Template</label>
              <textarea id="blockPromptTemplateInput" class="prompt-editor"></textarea>
            </div>

            <div class="field-group" style="margin-top: 16px;">
              <label class="field-label">Dependencies</label>
              <div id="dependencyCheckboxes" class="dependency-list"></div>
            </div>
            
            <div style="margin-top: 24px; display: flex; justify-content: space-between;">
              <div style="display: flex; gap: 8px;">
                <button id="moveBlockLeftBtn" type="button" class="btn">Move Up</button>
                <button id="moveBlockRightBtn" type="button" class="btn">Move Down</button>
              </div>
              <div style="display: flex; gap: 8px;">
                <button id="duplicateBlockBtn" type="button" class="btn">Duplicate</button>
                <button id="deleteBlockBtn" type="button" class="btn danger">Delete</button>
              </div>
            </div>
          </form>
        </div>
      </section>

      <!-- Right Panel: Monitor & Inspector -->
      <aside class="monitor-right">
        <div class="tabs">
          <button id="tabMonitorBtn" class="tab-btn active">Monitor</button>
          <button id="tabTimelineBtn" class="tab-btn">Timeline</button>
          <button id="tabHistoryBtn" class="tab-btn">History</button>
          <button id="tabLogsBtn" class="tab-btn">Logs</button>
        </div>

        <div id="tabMonitor" class="tab-pane">
          <div class="summary-stats">
            <div class="stat-card">
              <div id="qualityScoreLabel" class="stat-val">-</div>
              <div class="stat-label">Quality Score</div>
            </div>
            <div class="stat-card">
              <div id="wordCountLabel" class="stat-val">0</div>
              <div class="stat-label">Total Words</div>
            </div>
          </div>
          <h2>Live Artifact Feed</h2>
          <div id="artifactFeed" class="artifact-feed"></div>
        </div>

        <div id="tabTimeline" class="tab-pane hidden">
          <h2>Story Narrative</h2>
          <div id="storyTimeline" class="timeline-container"></div>
        </div>

        <div id="tabHistory" class="tab-pane hidden">
          <h2>Past Runs</h2>
          <div id="runsList" class="runs-list"></div>
        </div>

        <div id="tabLogs" class="tab-pane hidden" style="flex-direction: column; display: flex; height: 100%;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <h2>UI Activity</h2>
            <div style="display: flex; gap: 8px;">
              <button id="copyUiLogBtn" class="btn" style="padding: 4px 8px; font-size: 0.75rem;">Copy</button>
              <button id="clearUiLogBtn" class="btn danger" style="padding: 4px 8px; font-size: 0.75rem;">Clear</button>
            </div>
          </div>
          <div id="uiLogPanel" class="ui-log-panel" style="flex: 1; overflow-y: auto;"></div>
        </div>
      </aside>
    </main>

    <!-- Overlay for Comparison -->
    <div id="compareOverlay" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 40px; display: flex; flex-direction: column;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2>Compare Runs</h2>
        <button id="closeCompareBtn" class="btn">&times; Close</button>
      </div>
      
      <div class="glass-panel" style="display: flex; gap: 20px; align-items: flex-end;">
        <div class="field-group">
          <label class="field-label">Baseline (Previous)</label>
          <select id="baselineRunSelect"></select>
        </div>
        <div class="field-group">
          <label class="field-label">Candidate (Current)</label>
          <select id="candidateRunSelect"></select>
        </div>
        <button id="compareRunsBtn" class="btn primary">Start Comparison</button>
      </div>

      <div id="compareResult" style="flex: 1; overflow-y: auto; margin-top: 20px;"></div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <dialog id="settingsDialog">
      <form id="settingsForm" method="dialog">
        <h2>Provider Settings</h2>
        <div class="field-group" style="margin-bottom: 12px;">
          <label class="field-label">Gemini API Key</label>
          <input id="geminiKeyInput" type="password" />
        </div>
        <div class="field-group" style="margin-bottom: 12px;">
          <label class="field-label">OpenAI API Key</label>
          <input id="openaiKeyInput" type="password" />
        </div>
        <div class="field-group" style="margin-bottom: 12px;">
          <label class="field-label">Google Credentials Path</label>
          <input id="googleCredPathInput" type="text" />
        </div>
        <div id="settingsStatusBadges" class="badge-row" style="margin-bottom: 12px; display: flex; gap: 8px;"></div>
        
        <div class="dialog-actions" style="margin-top: 20px; display: flex; justify-content: space-between;">
          <button id="freshStartBtn" type="button" class="btn danger">Fresh Start</button>
          <div style="display: flex; gap: 8px;">
            <button id="cancelSettingsBtn" type="button" class="btn">Cancel</button>
            <button id="saveSettingsBtn" type="button" class="btn primary">Save Changes</button>
          </div>
        </div>
      </form>
    </dialog>

    <datalist id="providerModelList"></datalist>
    <script src="/admin-static/app.js"></script>
  </body>
</html>
